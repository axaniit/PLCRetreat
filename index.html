<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLC Origin</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: Georgia, "Times New Roman", serif;
      color: #f5f2e8;
    }

    .screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .bg {
      position: absolute;
      inset: -2%;
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
      transition: background-image 0.6s ease;
      filter: brightness(0.92);
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.02), transparent 42%),
        radial-gradient(circle at center, transparent 48%, rgba(0,0,0,0.52) 100%);
      pointer-events: none;
      z-index: 4;
    }

    .particles {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 248, 230, 0.7);
      box-shadow: 0 0 8px rgba(255, 248, 230, 0.35);
      animation: driftUp linear infinite;
    }

    .particle.soft {
      width: 2px;
      height: 2px;
      opacity: 0.5;
      box-shadow: 0 0 4px rgba(255, 248, 230, 0.22);
    }

    .scene-particle {
      background: rgba(245, 245, 245, 0.40);
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.16);
    }

    .scene-particle.soft {
      background: rgba(245, 245, 245, 0.24);
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.10);
    }

    @keyframes driftUp {
      0% { transform: translateY(0px) translateX(0px); opacity: 0; }
      10% { opacity: 0.45; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-120px) translateX(14px); opacity: 0; }
    }

    .branches {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.7s ease;
      overflow: hidden;
    }

    .branches.show {
      opacity: 1;
    }

    .branch-img {
      position: absolute;
      top: -4%;
      left: 50%;
      width: 118%;
      max-width: none;
      height: auto;
      transform: translateX(-50%);
      transform-origin: center top;
      opacity: 0.96;
      animation: swayBranches 5.5s ease-in-out infinite alternate;
    }

    @keyframes swayBranches {
      0% { transform: translateX(-50%) rotate(-1.1deg); }
      100% { transform: translateX(-50%) rotate(1.1deg); }
    }

    .mist {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .mist.show {
      opacity: 1;
    }

    .mist::before,
    .mist::after {
      content: "";
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      filter: blur(10px);
    }

    .mist::before {
      background:
        radial-gradient(circle at 50% 34%, rgba(255,255,255,0.10), transparent 18%),
        radial-gradient(circle at 52% 52%, rgba(255,255,255,0.07), transparent 22%),
        radial-gradient(circle at 46% 70%, rgba(255,255,255,0.05), transparent 20%);
      animation: mistFloatA 12s ease-in-out infinite alternate;
    }

    .mist::after {
      background:
        radial-gradient(circle at 58% 40%, rgba(255,255,255,0.07), transparent 16%),
        radial-gradient(circle at 42% 58%, rgba(255,255,255,0.06), transparent 18%);
      animation: mistFloatB 15s ease-in-out infinite alternate;
    }

    @keyframes mistFloatA {
      0% { transform: translateY(0px) translateX(0px); }
      100% { transform: translateY(-10px) translateX(6px); }
    }

    @keyframes mistFloatB {
      0% { transform: translateY(0px) translateX(0px); }
      100% { transform: translateY(8px) translateX(-8px); }
    }

    .apollo-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.7s ease;
      overflow: hidden;
    }

    .apollo-overlay.show {
      opacity: 1;
    }

    .apollo-img {
      position: absolute;
      left: 50%;
      top: 12%;
      width: min(54vw, 680px);
      transform: translateX(-50%);
      opacity: 0.82;
    }

    .scene2-swirls {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    .scene2-swirls.show {
      opacity: 1;
    }

    .swirl-zone {
      position: absolute;
      left: 50%;
      top: 52%;
      width: 420px;
      height: 220px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .wind-streak,
    .leaf-swirl {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: center center;
    }

    .wind-streak {
      opacity: 0.75;
      filter: brightness(1.08);
    }

    .leaf-swirl {
      opacity: 0.86;
    }

    .wind-a { width: 150px; animation: orbitA 5.2s linear infinite; }
    .wind-b { width: 130px; animation: orbitB 4.6s linear infinite; }
    .wind-c { width: 120px; animation: orbitC 3.8s linear infinite; }
    .wind-d { width: 92px;  animation: orbitD 3.1s linear infinite; }

    .leaf-a { width: 18px; animation: leafOrbitA 4.7s linear infinite; }
    .leaf-b { width: 20px; animation: leafOrbitB 5.3s linear infinite; }
    .leaf-c { width: 16px; animation: leafOrbitC 4.0s linear infinite; }
    .leaf-d { width: 22px; animation: leafOrbitD 5.8s linear infinite; }
    .leaf-e { width: 14px; animation: leafOrbitE 3.9s linear infinite; }
    .leaf-f { width: 18px; animation: leafOrbitF 4.9s linear infinite; }

    @keyframes orbitA {
      0%   { transform: translate(-130px, 20px) rotate(0deg); opacity: 0; }
      15%  { opacity: 0.72; }
      50%  { transform: translate(0px, -8px) rotate(10deg); opacity: 0.82; }
      100% { transform: translate(150px, 18px) rotate(18deg); opacity: 0; }
    }

    @keyframes orbitB {
      0%   { transform: translate(120px, 26px) rotate(180deg); opacity: 0; }
      15%  { opacity: 0.62; }
      50%  { transform: translate(6px, -14px) rotate(196deg); opacity: 0.76; }
      100% { transform: translate(-130px, 24px) rotate(208deg); opacity: 0; }
    }

    @keyframes orbitC {
      0%   { transform: translate(-80px, 45px) rotate(-6deg); opacity: 0; }
      15%  { opacity: 0.56; }
      50%  { transform: translate(18px, 0px) rotate(4deg); opacity: 0.68; }
      100% { transform: translate(102px, 34px) rotate(10deg); opacity: 0; }
    }

    @keyframes orbitD {
      0%   { transform: translate(70px, 50px) rotate(12deg); opacity: 0; }
      15%  { opacity: 0.44; }
      50%  { transform: translate(-4px, 2px) rotate(20deg); opacity: 0.58; }
      100% { transform: translate(-92px, 46px) rotate(26deg); opacity: 0; }
    }

    @keyframes leafOrbitA {
      0%   { transform: translate(-118px, 14px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.72; }
      100% { transform: translate(142px, 10px) rotate(320deg); opacity: 0; }
    }

    @keyframes leafOrbitB {
      0%   { transform: translate(126px, 22px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.76; }
      100% { transform: translate(-126px, 28px) rotate(340deg); opacity: 0; }
    }

    @keyframes leafOrbitC {
      0%   { transform: translate(-76px, 50px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.7; }
      100% { transform: translate(88px, 30px) rotate(280deg); opacity: 0; }
    }

    @keyframes leafOrbitD {
      0%   { transform: translate(92px, 56px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.7; }
      100% { transform: translate(-100px, 36px) rotate(360deg); opacity: 0; }
    }

    @keyframes leafOrbitE {
      0%   { transform: translate(-36px, 62px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.64; }
      100% { transform: translate(74px, 38px) rotate(260deg); opacity: 0; }
    }

    @keyframes leafOrbitF {
      0%   { transform: translate(26px, 58px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.68; }
      100% { transform: translate(-82px, 34px) rotate(300deg); opacity: 0; }
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      transition: opacity 0.6s ease;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .story-mode {
      justify-content: flex-start;
      padding-top: 7vh;
      padding-bottom: 4vh;
    }

    .loading {
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      color: #c8a64b;
      margin-bottom: 16px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
      opacity: 1;
      transition: opacity 0.8s ease;
    }

    .title {
      margin: 0;
      font-size: clamp(2.1rem, 4vw, 3.4rem);
      line-height: 1.12;
      max-width: 850px;
      color: #f5f2e8;
      text-shadow: 0 2px 16px rgba(0,0,0,0.58);
      opacity: 0;
      transform: translateY(10px);
      transition: 1s ease;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 1rem;
      line-height: 1.6;
      color: #ddd6c2;
      text-shadow: 0 2px 12px rgba(0,0,0,0.52);
      opacity: 0;
      transform: translateY(10px);
      transition: 1s ease 0.2s;
    }

    .button,
    .continue-btn {
      margin-top: 32px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .button {
      opacity: 0;
      transform: translateY(10px);
      transition: 1s ease 0.4s;
    }

    .button-inner,
    .continue-inner {
      position: relative;
      display: inline-block;
      min-width: 150px;
      padding: 13px 28px;
      background: #f5f2e8;
      color: #111;
      border: 1.5px solid #111;
      border-radius: 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 0.05em;
      box-shadow:
        0 8px 20px rgba(0,0,0,0.25),
        inset 0 0 0 1px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    .button-inner::before,
    .continue-inner::before {
      content: "";
      position: absolute;
      inset: 6px;
      border: 1px dashed #111;
      border-radius: 9px;
      pointer-events: none;
    }

    .button-inner::after,
    .continue-inner::after {
      content: "✦";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      color: #111;
      opacity: 0.85;
    }

    .button:hover .button-inner,
    .continue-btn:hover .continue-inner {
      background: #ebe6d6;
      transform: translateY(-2px);
      box-shadow:
        0 12px 28px rgba(0,0,0,0.35),
        inset 0 0 0 1px rgba(0,0,0,0.04);
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    .fade-out {
      opacity: 0;
    }

    .story-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      max-width: 1100px;
      width: 100%;
      min-height: 100%;
    }

    .story-text {
      font-size: 1.02rem;
      max-width: 760px;
      line-height: 1.68;
      color: #f5f2e8;
      text-shadow: 0 2px 14px rgba(0,0,0,0.62);
      opacity: 0;
      transform: translateY(12px);
      transition: 1s ease;
      margin-bottom: 18px;
      background: rgba(0, 0, 0, 0.30);
      border: 1px solid rgba(245, 242, 232, 0.08);
      border-radius: 16px;
      padding: 18px 20px;
      backdrop-filter: blur(1px);
      box-sizing: border-box;
    }

    .choices {
      width: min(980px, 92vw);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: auto;
      padding-top: 18px;
    }

    .choice-btn {
      position: relative;
      display: block;
      width: 100%;
      min-height: 118px;
      text-align: left;
      padding: 14px 16px;
      background: rgba(245, 242, 232, 0.94);
      color: #111;
      border: 1.5px solid #111;
      border-radius: 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.9rem;
      line-height: 1.38;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      box-sizing: border-box;
    }

    .choice-btn::before {
      content: "";
      position: absolute;
      inset: 6px;
      border: 1px dashed rgba(17,17,17,0.85);
      border-radius: 8px;
      pointer-events: none;
    }

    .choice-btn:hover {
      background: #ebe6d6;
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(0,0,0,0.24);
    }

    .choice-btn.selected {
      background: #ddd6c2;
      box-shadow: 0 12px 28px rgba(0,0,0,0.30);
      transform: translateY(-1px);
    }

    .status-note {
      margin-top: 14px;
      margin-bottom: 6px;
      font-size: 0.92rem;
      color: #ddd6c2;
      opacity: 0;
      transform: translateY(6px);
      transition: 0.4s ease;
    }

    .status-note.show {
      opacity: 1;
      transform: translateY(0);
    }

    .continue-wrap {
      margin-top: 16px;
      opacity: 0;
      transform: translateY(8px);
      transition: 0.4s ease;
    }

    .continue-wrap.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      .choices {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .choice-btn {
        min-height: 108px;
      }

      .swirl-zone {
        width: 320px;
        height: 180px;
        top: 56%;
      }
    }

    @media (max-width: 640px) {
      .story-mode {
        padding-top: 4vh;
        padding-bottom: 4vh;
      }

      .branch-img {
        width: 145%;
      }

      .apollo-img {
        width: 90vw;
        top: 12%;
      }

      .story-text {
        font-size: 1rem;
        padding: 18px;
      }

      .choices {
        grid-template-columns: 1fr;
        width: min(680px, 92vw);
      }

      .choice-btn {
        min-height: auto;
        font-size: 0.92rem;
      }

      .swirl-zone {
        width: 260px;
        height: 150px;
        top: 58%;
      }
    }
  </style>
</head>

<body>
  <div class="screen">
    <div class="bg" id="bg"></div>

    <div class="particles" id="particles">
      <span class="particle" style="left:8%; bottom:10%; animation-duration:13s; animation-delay:0s;"></span>
      <span class="particle soft" style="left:16%; bottom:22%; animation-duration:10s; animation-delay:1s;"></span>
      <span class="particle soft" style="left:24%; bottom:8%; animation-duration:12s; animation-delay:2.1s;"></span>
      <span class="particle" style="left:33%; bottom:18%; animation-duration:15s; animation-delay:0.6s;"></span>
      <span class="particle soft" style="left:41%; bottom:11%; animation-duration:11s; animation-delay:1.4s;"></span>
      <span class="particle" style="left:49%; bottom:19%; animation-duration:14s; animation-delay:2.6s;"></span>
      <span class="particle soft" style="left:57%; bottom:9%; animation-duration:12s; animation-delay:0.9s;"></span>
      <span class="particle" style="left:66%; bottom:20%; animation-duration:16s; animation-delay:2.3s;"></span>
      <span class="particle soft" style="left:74%; bottom:14%; animation-duration:10s; animation-delay:1.8s;"></span>
      <span class="particle" style="left:82%; bottom:8%; animation-duration:13s; animation-delay:0.3s;"></span>
      <span class="particle soft" style="left:90%; bottom:17%; animation-duration:11s; animation-delay:2.8s;"></span>
    </div>

    <div class="mist" id="mist"></div>

    <div class="branches" id="branches">
      <img src="" alt="" class="branch-img" id="branchesImg">
    </div>

    <div class="apollo-overlay" id="apolloOverlay">
      <img src="" alt="" class="apollo-img" id="apolloImg">
    </div>

    <div class="scene2-swirls" id="scene2Swirls">
      <div class="swirl-zone">
        <img src="" alt="" class="wind-streak wind-a" id="windA">
        <img src="" alt="" class="wind-streak wind-b" id="windB">
        <img src="" alt="" class="wind-streak wind-c" id="windC">
        <img src="" alt="" class="wind-streak wind-d" id="windD">

        <img src="" alt="" class="leaf-swirl leaf-a" id="leafA">
        <img src="" alt="" class="leaf-swirl leaf-b" id="leafB">
        <img src="" alt="" class="leaf-swirl leaf-c" id="leafC">
        <img src="" alt="" class="leaf-swirl leaf-d" id="leafD">
        <img src="" alt="" class="leaf-swirl leaf-e" id="leafE">
        <img src="" alt="" class="leaf-swirl leaf-f" id="leafF">
      </div>
    </div>

    <div class="vignette"></div>

    <div class="content" id="content">
      <div class="loading" id="loading">
        Loading your path...
      </div>

      <h1 class="title" id="title">
        What Is Your PLC Origin Story?
      </h1>

      <div class="subtitle" id="subtitle">
        The path begins behind Lake Claire.
      </div>

      <button class="button" id="begin" type="button">
        <span class="button-inner">Begin</span>
      </button>
    </div>
  </div>

  <script>
    /* If your folder is actually named assets/bfs instead of assets/backgrounds,
       only change the first three lines below. */
    const PATHS = {
      loadingBg: "assets/backgrounds/loading-bg.png",
      scene1Bg: "assets/backgrounds/scene1-bg.png",
      scene2Bg: "assets/backgrounds/scene2-bg.jpeg",

      branches: "assets/overlays/scene1-branches.png",
      apollo: "assets/overlays/Apollo.png",

      leaf1: "assets/effects/leaves/leaf1.png",
      leaf2: "assets/effects/leaves/leaf2.png",
      leaf3: "assets/effects/leaves/leaf3.png",
      leaf4: "assets/effects/leaves/leaf4.png",

      wind1: "assets/effects/wind/wind1.png",
      wind2: "assets/effects/wind/wind2.png",
      wind3: "assets/effects/wind/wind3.png",
      wind4: "assets/effects/wind/wind4.png"
    };

    const loading = document.getElementById("loading");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const button = document.getElementById("begin");
    const content = document.getElementById("content");
    const bg = document.getElementById("bg");
    const branches = document.getElementById("branches");
    const mist = document.getElementById("mist");
    const particles = document.getElementById("particles");
    const apolloOverlay = document.getElementById("apolloOverlay");
    const scene2Swirls = document.getElementById("scene2Swirls");

    document.getElementById("branchesImg").src = PATHS.branches;
    document.getElementById("apolloImg").src = PATHS.apollo;

    document.getElementById("windA").src = PATHS.wind1;
    document.getElementById("windB").src = PATHS.wind2;
    document.getElementById("windC").src = PATHS.wind3;
    document.getElementById("windD").src = PATHS.wind4;

    document.getElementById("leafA").src = PATHS.leaf1;
    document.getElementById("leafB").src = PATHS.leaf2;
    document.getElementById("leafC").src = PATHS.leaf3;
    document.getElementById("leafD").src = PATHS.leaf4;
    document.getElementById("leafE").src = PATHS.leaf1;
    document.getElementById("leafF").src = PATHS.leaf3;

    const scores = JSON.parse(localStorage.getItem("plcOriginScores")) || {
      hero: 0,
      antihero: 0,
      sorcerer: 0,
      alchemist: 0,
      trickster: 0,
      sage: 0
    };

    function saveScores() {
      localStorage.setItem("plcOriginScores", JSON.stringify(scores));
    }

    function setBackground(path, overlayStrength = "0.42") {
      bg.style.backgroundImage = `
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.10),
          rgba(0, 0, 0, 0.22) 45%,
          rgba(0, 0, 0, ${overlayStrength})
        ),
        url("${path}")
      `;
    }

    function applyChoice(archetype, buttonEl, onComplete) {
      scores[archetype] += 1;
      saveScores();

      document.querySelectorAll(".choice-btn").forEach((btn) => {
        btn.disabled = true;
        btn.classList.remove("selected");
      });

      buttonEl.classList.add("selected");

      const status = document.getElementById("statusNote");
      if (status) {
        status.textContent = "Choice recorded.";
        status.classList.add("show");
      }

      console.log("Current PLC Origin scores:", scores);

      if (onComplete) {
        setTimeout(onComplete, 700);
      }
    }

    function softenParticles() {
      [...particles.children].forEach((p) => p.classList.add("scene-particle"));
    }

    function renderScene1() {
      setBackground(PATHS.scene1Bg, "0.42");
      branches.classList.add("show");
      mist.classList.add("show");
      apolloOverlay.classList.remove("show");
      scene2Swirls.classList.remove("show");
      softenParticles();

      content.innerHTML = `
        <div class="story-wrap">
          <div class="story-text" id="story">
            You step onto a path behind Lake Claire. The trees close in faster than you expect, and the sounds of campus fall away until it is just you and the quiet. There is no guide, no instructions, no sign telling you what comes next. Just the path, and the choice to begin.
          </div>

          <div class="choices">
            <button class="choice-btn" data-archetype="hero">A. Move forward anyway. If something needs to be faced, you will face it.</button>
            <button class="choice-btn" data-archetype="antihero">B. Pause. You are not stepping into something without understanding it first.</button>
            <button class="choice-btn" data-archetype="sorcerer">C. Stay still and take it in. The silence is not empty. There is something to notice.</button>
            <button class="choice-btn" data-archetype="alchemist">D. Look closer at your surroundings. If you are going to move forward, you want something to work with.</button>
            <button class="choice-btn" data-archetype="trickster">E. Step slightly off the path. You want to see how far it actually holds.</button>
            <button class="choice-btn" data-archetype="sage">F. Take a breath and consider where this path could lead before committing to it.</button>
          </div>

          <div class="status-note" id="statusNote"></div>
        </div>
      `;

      const story = document.getElementById("story");

      setTimeout(() => {
        content.classList.remove("fade-out");
        content.classList.add("story-mode");
        story.style.opacity = "1";
        story.style.transform = "translateY(0)";
      }, 120);

      document.querySelectorAll(".choice-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          applyChoice(btn.dataset.archetype, btn, () => {
            content.classList.add("fade-out");
            setTimeout(renderScene2, 550);
          });
        });
      });
    }

    function renderScene2() {
      setBackground(PATHS.scene2Bg, "0.48");
      branches.classList.add("show");
      mist.classList.add("show");
      apolloOverlay.classList.add("show");
      scene2Swirls.classList.add("show");
      softenParticles();

      content.innerHTML = `
        <div class="story-wrap">
          <div class="story-text" id="story">
            Further in, the trees begin to thin, and stone rises through the roots. What should be familiar doesn’t feel that way anymore. A structure stands ahead, columns worn and sunlit, arranged like something older than the campus around it. A shrine. To Apollo. You do not remember this being here. Then something shifts. Not loud. Not sudden. But enough to tell you the path has changed.
          </div>

          <div class="choices">
            <button class="choice-btn" data-archetype="hero">A. Move toward it. If something is wrong, you are not going to leave it alone.</button>
            <button class="choice-btn" data-archetype="antihero">B. Stay just out of reach and watch closely. You want to understand it before you decide how to act.</button>
            <button class="choice-btn" data-archetype="sorcerer">C. Follow its movement. The way it shifts tells you more than anything you could ask.</button>
            <button class="choice-btn" data-archetype="alchemist">D. Reach for something useful nearby. If it becomes a problem, you will be ready for it.</button>
            <button class="choice-btn" data-archetype="trickster">E. Make your presence known. If something is out there, you would rather it react to you.</button>
            <button class="choice-btn" data-archetype="sage">F. Hold your position and wait. Acting too soon would tell you less than staying still.</button>
          </div>

          <div class="status-note" id="statusNote"></div>
          <div class="continue-wrap" id="continueWrap">
            <button class="continue-btn" type="button">
              <span class="continue-inner">Continue</span>
            </button>
          </div>
        </div>
      `;

      const story = document.getElementById("story");

      setTimeout(() => {
        content.classList.remove("fade-out");
        content.classList.add("story-mode");
        story.style.opacity = "1";
        story.style.transform = "translateY(0)";
      }, 120);

      document.querySelectorAll(".choice-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          applyChoice(btn.dataset.archetype, btn, () => {
            const status = document.getElementById("statusNote");
            const continueWrap = document.getElementById("continueWrap");
            if (status) status.textContent = "Choice recorded. Scene 2 complete.";
            if (continueWrap) continueWrap.classList.add("show");
          });
        });
      });

      const continueBtn = document.querySelector(".continue-btn");
      if (continueBtn) {
        continueBtn.addEventListener("click", () => {
          console.log("Ready for Scene 3. Current PLC Origin scores:", scores);
        });
      }
    }

    setBackground(PATHS.loadingBg, "0.58");

    setTimeout(() => {
      loading.style.opacity = "0";
    }, 1200);

    setTimeout(() => {
      title.classList.add("show");
      subtitle.classList.add("show");
      button.classList.add("show");
    }, 1600);

    button.addEventListener("click", () => {
      content.classList.add("fade-out");
      setTimeout(renderScene1, 650);
    });
  </script>
</body>
</html>
