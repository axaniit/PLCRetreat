<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLC Origin</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: Georgia, "Times New Roman", serif;
      color: #f5f2e8;
    }

    .screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .bg {
      position: absolute;
      inset: -2%;
      background:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.20),
          rgba(0, 0, 0, 0.38) 45%,
          rgba(0, 0, 0, 0.58)
        ),
        url("loading-bg.png") center center / cover no-repeat;
      transform: scale(1.03);
      animation: bgDrift 18s ease-in-out infinite alternate;
    }

    @keyframes bgDrift {
      0% {
        transform: scale(1.03) translateY(0px);
      }
      100% {
        transform: scale(1.06) translateY(-10px);
      }
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.02), transparent 42%),
        radial-gradient(circle at center, transparent 48%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .particles {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 248, 230, 0.7);
      box-shadow: 0 0 8px rgba(255, 248, 230, 0.35);
      animation: driftUp linear infinite;
    }

    .particle.soft {
      width: 2px;
      height: 2px;
      opacity: 0.5;
      box-shadow: 0 0 4px rgba(255, 248, 230, 0.22);
    }

    @keyframes driftUp {
      0% {
        transform: translateY(0px) translateX(0px);
        opacity: 0;
      }
      10% {
        opacity: 0.45;
      }
      50% {
        opacity: 0.85;
      }
      100% {
        transform: translateY(-120px) translateX(14px);
        opacity: 0;
      }
    }

    .content {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      transition: opacity 0.6s ease;
    }

    .loading {
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      color: #c8a64b;
      margin-bottom: 16px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
      opacity: 1;
      transition: opacity 0.8s ease;
    }

    .title {
      margin: 0;
      font-size: clamp(2.1rem, 4vw, 3.4rem);
      line-height: 1.12;
      max-width: 850px;
      color: #f5f2e8;
      text-shadow: 0 2px 16px rgba(0,0,0,0.58);
      opacity: 0;
      transform: translateY(10px);
      transition: 1s ease;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 1rem;
      line-height: 1.6;
      color: #ddd6c2;
      text-shadow: 0 2px 12px rgba(0,0,0,0.52);
      opacity: 0;
      transform: translateY(10px);
      transition: 1s ease 0.2s;
    }

    .button {
      margin-top: 32px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      transition: 1s ease 0.4s;
    }

    .button-inner {
      position: relative;
      display: inline-block;
      min-width: 150px;
      padding: 13px 28px;
      background: #f5f2e8;
      color: #111;
      border: 1.5px solid #111;
      border-radius: 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 0.05em;
      box-shadow:
        0 8px 20px rgba(0,0,0,0.25),
        inset 0 0 0 1px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    .button-inner::before {
      content: "";
      position: absolute;
      inset: 6px;
      border: 1px dashed #111;
      border-radius: 9px;
      pointer-events: none;
    }

    .button-inner::after {
      content: "✦";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      color: #111;
      opacity: 0.85;
    }

    .button:hover .button-inner {
      background: #ebe6d6;
      transform: translateY(-2px);
      box-shadow:
        0 12px 28px rgba(0,0,0,0.35),
        inset 0 0 0 1px rgba(0,0,0,0.04);
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    .fade-out {
      opacity: 0;
    }

    .story-text {
      font-size: 1.35rem;
      max-width: 740px;
      line-height: 1.7;
      color: #f5f2e8;
      text-shadow: 0 2px 14px rgba(0,0,0,0.55);
      opacity: 0;
      transform: translateY(12px);
      transition: 1s ease;
    }
  </style>
</head>

<body>
  <div class="screen">
    <div class="bg"></div>

    <div class="particles">
      <span class="particle" style="left:8%; bottom:10%; animation-duration:13s; animation-delay:0s;"></span>
      <span class="particle soft" style="left:16%; bottom:22%; animation-duration:10s; animation-delay:1s;"></span>
      <span class="particle soft" style="left:24%; bottom:8%; animation-duration:12s; animation-delay:2.1s;"></span>
      <span class="particle" style="left:33%; bottom:18%; animation-duration:15s; animation-delay:0.6s;"></span>
      <span class="particle soft" style="left:41%; bottom:11%; animation-duration:11s; animation-delay:1.4s;"></span>
      <span class="particle" style="left:49%; bottom:19%; animation-duration:14s; animation-delay:2.6s;"></span>
      <span class="particle soft" style="left:57%; bottom:9%; animation-duration:12s; animation-delay:0.9s;"></span>
      <span class="particle" style="left:66%; bottom:20%; animation-duration:16s; animation-delay:2.3s;"></span>
      <span class="particle soft" style="left:74%; bottom:14%; animation-duration:10s; animation-delay:1.8s;"></span>
      <span class="particle" style="left:82%; bottom:8%; animation-duration:13s; animation-delay:0.3s;"></span>
      <span class="particle soft" style="left:90%; bottom:17%; animation-duration:11s; animation-delay:2.8s;"></span>
    </div>

    <div class="vignette"></div>

    <div class="content" id="content">
      <div class="loading" id="loading">
        Loading your path...
      </div>

      <h1 class="title" id="title">
        What Is Your PLC Origin Story?
      </h1>

      <div class="subtitle" id="subtitle">
        The path begins behind Lake Claire.
      </div>

      <button class="button" id="begin" type="button">
        <span class="button-inner">Begin</span>
      </button>
    </div>
  </div>

  <script>
    const loading = document.getElementById("loading");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const button = document.getElementById("begin");
    const content = document.getElementById("content");

    setTimeout(() => {
      loading.style.opacity = "0";
    }, 1200);

    setTimeout(() => {
      title.classList.add("show");
      subtitle.classList.add("show");
      button.classList.add("show");
    }, 1600);

    button.addEventListener("click", () => {
      content.classList.add("fade-out");

      setTimeout(() => {
        content.innerHTML = `
          <div class="story-text" id="story">
            You step onto the path behind Lake Claire.
            <br><br>
            The forest is quiet. Too quiet.
            <br><br>
            Something waits ahead.
          </div>
        `;

        const story = document.getElementById("story");

        setTimeout(() => {
          content.classList.remove("fade-out");
          story.style.opacity = "1";
          story.style.transform = "translateY(0)";
        }, 100);
      }, 600);
    });
  </script>
</body>
</html>
