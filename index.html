<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLC Origin Test</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      background: black;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .sparkle {
      position: absolute;
      width: 90px;
      height: auto;
    }

    .sparkle-one {
      left: 45%;
      top: 50%;
      animation: floatSparkle 3s ease-in-out infinite;
    }

    .sparkle-two {
      left: 55%;
      top: 40%;
      width: 60px;
      animation: floatSparkle 2.5s ease-in-out infinite 0.5s;
    }

    .sparkle-three {
      left: 60%;
      top: 60%;
      width: 20px;
      animation: floatSparkle 3.5s ease-in-out infinite 1s;
    }

    @keyframes floatSparkle {
      0% {
        transform: translateY(0px) scale(1);
        opacity: 0.4;
      }
      50% {
        transform: translateY(-15px) scale(1.05);
        opacity: 1;
      }
      100% {
        transform: translateY(0px) scale(1);
        opacity: 0.4;
      }
    }

    /* Optional: subtle fade-in for page */
    body {
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>
  <main class="stage">

    <!-- MAIN TEST -->
    <img src="sparkle-main.png" alt="Sparkle main" class="sparkle sparkle-one">

    <!-- OPTIONAL: if you create these -->
    <!--
    <img src="sparkle-small.png" alt="Sparkle small" class="sparkle sparkle-two">
    <img src="sparkle-dot.png" alt="Sparkle dot" class="sparkle sparkle-three">
    -->

  </main>
</body>
</html>
