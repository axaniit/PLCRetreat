<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLC Origin</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      overflow: hidden;
      background: black;
      font-family: Georgia, "Times New Roman", serif;
      color: #f5f2e8;
    }

    .screen {
      position: relative;
      width: 100vw;
      height: 100vh;

      background:
        linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
        url("loading-bg.png") center center / cover no-repeat;
    }

    .content {
      position: absolute;
      inset: 0;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      text-align: center;
      padding: 20px;
      transition: opacity 0.6s ease;
    }

    .loading {
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      color: #c8a64b;
      margin-bottom: 15px;
      opacity: 1;
      transition: opacity 0.8s ease;
    }

    .title {
      font-size: clamp(2rem, 4vw, 3.2rem);
      opacity: 0;
      transform: translateY(10px);
      transition: 1s ease;
      max-width: 800px;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 1rem;
      opacity: 0;
      transform: translateY(10px);
      transition: 1s ease 0.2s;
    }

    .button {
      margin-top: 30px;
      padding: 10px 22px;
      border: 1px solid #c8a64b;
      background: rgba(0,0,0,0.6);
      color: white;
      cursor: pointer;

      opacity: 0;
      transform: translateY(10px);
      transition: 1s ease 0.4s;
    }

    .button:hover {
      background: rgba(20,20,20,0.9);
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    .fade-out {
      opacity: 0;
    }

    .story-text {
      font-size: 1.4rem;
      max-width: 700px;
      line-height: 1.6;
      opacity: 0;
      transform: translateY(10px);
      transition: 1s ease;
    }
  </style>
</head>

<body>
  <div class="screen">
    <div class="content" id="content">

      <div class="loading" id="loading">
        Loading your path...
      </div>

      <h1 class="title" id="title">
        What Is Your PLC Origin Story?
      </h1>

      <div class="subtitle" id="subtitle">
        The path begins behind Lake Claire.
      </div>

      <button class="button" id="begin">
        Begin
      </button>

    </div>
  </div>

  <script>
    const loading = document.getElementById("loading");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const button = document.getElementById("begin");
    const content = document.getElementById("content");

    // Initial animation
    setTimeout(() => {
      loading.style.opacity = "0";
    }, 1200);

    setTimeout(() => {
      title.classList.add("show");
      subtitle.classList.add("show");
      button.classList.add("show");
    }, 1600);

    // Begin button → transition to story
    button.addEventListener("click", () => {
      content.classList.add("fade-out");

      setTimeout(() => {
        content.innerHTML = `
          <div class="story-text" id="story">
            You step onto the path behind Lake Claire.
            <br><br>
            The forest is quiet. Too quiet.
            <br><br>
            Something waits ahead.
          </div>
        `;

        const story = document.getElementById("story");

        setTimeout(() => {
          content.classList.remove("fade-out");
          story.style.opacity = "1";
          story.style.transform = "translateY(0)";
        }, 100);

      }, 600);
    });
  </script>
</body>
</html>
