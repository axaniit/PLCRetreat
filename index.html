<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLC Origin</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: Georgia, "Times New Roman", serif;
      color: #f5f2e8;
    }

    .screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .bg {
      position: absolute;
      inset: -2%;
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
      transition: background-image 0.6s ease;
      filter: brightness(0.92);
      z-index: 1;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.02), transparent 42%),
        radial-gradient(circle at center, transparent 48%, rgba(0,0,0,0.52) 100%);
      pointer-events: none;
      z-index: 4;
    }

    .particles {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 248, 230, 0.7);
      box-shadow: 0 0 8px rgba(255, 248, 230, 0.35);
      animation: driftUp linear infinite;
    }

    .particle.soft {
      width: 2px;
      height: 2px;
      opacity: 0.5;
      box-shadow: 0 0 4px rgba(255, 248, 230, 0.22);
    }

    .scene-particle {
      background: rgba(245, 245, 245, 0.40);
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.16);
    }

    .scene-particle.soft {
      background: rgba(245, 245, 245, 0.24);
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.10);
    }

    @keyframes driftUp {
      0% { transform: translateY(0px) translateX(0px); opacity: 0; }
      10% { opacity: 0.45; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-120px) translateX(14px); opacity: 0; }
    }

    .branches {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.7s ease;
      overflow: hidden;
    }

    .branches.show {
      opacity: 1;
    }

    .branch-img {
      position: absolute;
      top: -4%;
      left: 50%;
      width: 118%;
      max-width: none;
      height: auto;
      transform: translateX(-50%);
      transform-origin: center top;
      opacity: 0.96;
      animation: swayBranches 5.5s ease-in-out infinite alternate;
    }

    @keyframes swayBranches {
      0% { transform: translateX(-50%) rotate(-1.1deg); }
      100% { transform: translateX(-50%) rotate(1.1deg); }
    }

    .mist {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .mist.show {
      opacity: 1;
    }

    .mist::before,
    .mist::after {
      content: "";
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      filter: blur(10px);
    }

    .mist::before {
      background:
        radial-gradient(circle at 50% 34%, rgba(255,255,255,0.10), transparent 18%),
        radial-gradient(circle at 52% 52%, rgba(255,255,255,0.07), transparent 22%),
        radial-gradient(circle at 46% 70%, rgba(255,255,255,0.05), transparent 20%);
      animation: mistFloatA 12s ease-in-out infinite alternate;
    }

    .mist::after {
      background:
        radial-gradient(circle at 58% 40%, rgba(255,255,255,0.07), transparent 16%),
        radial-gradient(circle at 42% 58%, rgba(255,255,255,0.06), transparent 18%);
      animation: mistFloatB 15s ease-in-out infinite alternate;
    }

    @keyframes mistFloatA {
      0% { transform: translateY(0px) translateX(0px); }
      100% { transform: translateY(-10px) translateX(6px); }
    }

    @keyframes mistFloatB {
      0% { transform: translateY(0px) translateX(0px); }
      100% { transform: translateY(8px) translateX(-8px); }
    }

    .apollo-overlay,
    .damsel-overlay,
    .dragon-overlay,
    .wings-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.7s ease;
      overflow: hidden;
    }

    .apollo-overlay { z-index: 19; }
    .damsel-overlay { z-index: 18; }
    .dragon-overlay { z-index: 18; }
    .wings-overlay { z-index: 19; }

    .apollo-overlay.show,
    .damsel-overlay.show,
    .dragon-overlay.show,
    .wings-overlay.show {
      opacity: 1;
    }

    .apollo-img {
      position: absolute;
      left: 50%;
      top: 15%;
      width: min(42vw, 520px);
      transform: translateX(-50%);
      opacity: 0.78;
    }

    .damsel-img {
      position: absolute;
      left: 50%;
      top: 15%;
      width: min(42vw, 520px);
      transform: translateX(-50%);
      opacity: 0.9;
      transform-origin: center center;
      animation: damselBreath 4.8s ease-in-out infinite;
    }

    @keyframes damselBreath {
      0% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.018); }
      100% { transform: translateX(-50%) scale(1); }
    }

    .dragon-img {
      position: absolute;
      left: 50%;
      top: 16%;
      width: min(68vw, 980px);
      transform: translateX(-50%);
      opacity: 0.95;
    }

    .wings-img {
      position: absolute;
      left: 40%;
      top: 8%;
      width: min(90vw, 1300px);
      transform: translateX(-50%);
      transform-origin: center 68%;
      opacity: 0.95;
      animation: flapWings 2.8s ease-in-out infinite;
    }

    @keyframes flapWings {
      0%   { transform: translateX(-50%) rotate(-0.25deg) scaleY(0.99) scaleX(0.995); }
      20%  { transform: translateX(-50%) rotate(0.15deg) scaleY(1.005) scaleX(1); }
      50%  { transform: translateX(-50%) rotate(0.35deg) scaleY(1.018) scaleX(1.01); }
      80%  { transform: translateX(-50%) rotate(0.08deg) scaleY(1.004) scaleX(1); }
      100% { transform: translateX(-50%) rotate(-0.25deg) scaleY(0.99) scaleX(0.995); }
    }

    .scene3-aura {
      position: absolute;
      inset: 0;
      z-index: 17;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    .scene3-aura.show {
      opacity: 1;
    }

    .aura-zone {
      position: absolute;
      left: 50%;
      top: 34%;
      width: 260px;
      height: 320px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .aura-particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
      box-shadow: 0 0 10px rgba(255,255,255,0.22);
      opacity: 0;
    }

    .aura-p1 { animation: auraFloat1 5.2s ease-in-out infinite; }
    .aura-p2 { animation: auraFloat2 4.7s ease-in-out infinite 0.8s; }
    .aura-p3 { animation: auraFloat3 5.8s ease-in-out infinite 1.1s; }
    .aura-p4 { animation: auraFloat4 4.3s ease-in-out infinite 0.5s; }
    .aura-p5 { animation: auraFloat5 5.0s ease-in-out infinite 1.4s; }
    .aura-p6 { animation: auraFloat6 4.9s ease-in-out infinite 0.2s; }
    .aura-p7 { animation: auraFloat7 5.6s ease-in-out infinite 1.7s; }
    .aura-p8 { animation: auraFloat8 4.5s ease-in-out infinite 0.9s; }

    @keyframes auraFloat1 {
      0%   { transform: translate(20px, 210px) scale(0.7); opacity: 0; }
      15%  { opacity: 0.55; }
      60%  { transform: translate(0px, 120px) scale(1); opacity: 0.75; }
      100% { transform: translate(10px, 40px) scale(0.7); opacity: 0; }
    }
    @keyframes auraFloat2 {
      0%   { transform: translate(180px, 220px) scale(0.7); opacity: 0; }
      15%  { opacity: 0.48; }
      60%  { transform: translate(150px, 130px) scale(1); opacity: 0.7; }
      100% { transform: translate(160px, 50px) scale(0.7); opacity: 0; }
    }
    @keyframes auraFloat3 {
      0%   { transform: translate(90px, 240px) scale(0.65); opacity: 0; }
      15%  { opacity: 0.42; }
      60%  { transform: translate(110px, 145px) scale(0.95); opacity: 0.66; }
      100% { transform: translate(100px, 70px) scale(0.65); opacity: 0; }
    }
    @keyframes auraFloat4 {
      0%   { transform: translate(35px, 165px) scale(0.55); opacity: 0; }
      15%  { opacity: 0.34; }
      60%  { transform: translate(55px, 95px) scale(0.9); opacity: 0.58; }
      100% { transform: translate(42px, 30px) scale(0.55); opacity: 0; }
    }
    @keyframes auraFloat5 {
      0%   { transform: translate(205px, 170px) scale(0.55); opacity: 0; }
      15%  { opacity: 0.34; }
      60%  { transform: translate(190px, 92px) scale(0.9); opacity: 0.58; }
      100% { transform: translate(198px, 28px) scale(0.55); opacity: 0; }
    }
    @keyframes auraFloat6 {
      0%   { transform: translate(125px, 200px) scale(0.7); opacity: 0; }
      15%  { opacity: 0.5; }
      60%  { transform: translate(140px, 118px) scale(1); opacity: 0.72; }
      100% { transform: translate(132px, 36px) scale(0.7); opacity: 0; }
    }
    @keyframes auraFloat7 {
      0%   { transform: translate(70px, 225px) scale(0.65); opacity: 0; }
      15%  { opacity: 0.42; }
      60%  { transform: translate(85px, 130px) scale(0.95); opacity: 0.64; }
      100% { transform: translate(78px, 48px) scale(0.65); opacity: 0; }
    }
    @keyframes auraFloat8 {
      0%   { transform: translate(155px, 230px) scale(0.65); opacity: 0; }
      15%  { opacity: 0.42; }
      60%  { transform: translate(170px, 138px) scale(0.95); opacity: 0.64; }
      100% { transform: translate(160px, 55px) scale(0.65); opacity: 0; }
    }

    .scene2-flow {
      position: absolute;
      inset: 0;
      z-index: 35;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    .scene2-flow.show {
      opacity: 1;
    }

    .flow-zone {
      position: absolute;
      left: 50%;
      top: 68%;
      width: 320px;
      height: 140px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .dust-swirl {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      box-shadow: 0 0 8px rgba(255,255,255,0.22);
      opacity: 0;
      transform-origin: center center;
    }

    .dust-a { animation: dustOrbitA 4.0s linear infinite; }
    .dust-b { animation: dustOrbitB 4.8s linear infinite 0.7s; }
    .dust-c { animation: dustOrbitC 3.6s linear infinite 1.1s; }
    .dust-d { animation: dustOrbitD 5.2s linear infinite 0.4s; }
    .dust-e { animation: dustOrbitE 4.4s linear infinite 1.5s; }
    .dust-f { animation: dustOrbitF 3.8s linear infinite 0.9s; }
    .dust-g { animation: dustOrbitG 5.6s linear infinite 0.2s; }
    .dust-h { animation: dustOrbitH 4.2s linear infinite 1.8s; }

    @keyframes dustOrbitA {
      0%   { transform: translate(-120px, 20px) scale(0.7); opacity: 0; }
      12%  { opacity: 0.55; }
      45%  { transform: translate(-18px, -10px) scale(1); opacity: 0.8; }
      100% { transform: translate(126px, 14px) scale(0.7); opacity: 0; }
    }
    @keyframes dustOrbitB {
      0%   { transform: translate(112px, 26px) scale(0.7); opacity: 0; }
      12%  { opacity: 0.46; }
      48%  { transform: translate(10px, -6px) scale(1); opacity: 0.72; }
      100% { transform: translate(-118px, 22px) scale(0.7); opacity: 0; }
    }
    @keyframes dustOrbitC {
      0%   { transform: translate(-70px, 42px) scale(0.6); opacity: 0; }
      14%  { opacity: 0.42; }
      52%  { transform: translate(22px, 6px) scale(1); opacity: 0.68; }
      100% { transform: translate(92px, 28px) scale(0.6); opacity: 0; }
    }
    @keyframes dustOrbitD {
      0%   { transform: translate(82px, 46px) scale(0.6); opacity: 0; }
      15%  { opacity: 0.38; }
      50%  { transform: translate(-8px, 10px) scale(1); opacity: 0.62; }
      100% { transform: translate(-96px, 34px) scale(0.6); opacity: 0; }
    }
    @keyframes dustOrbitE {
      0%   { transform: translate(-36px, 56px) scale(0.55); opacity: 0; }
      10%  { opacity: 0.34; }
      48%  { transform: translate(38px, 12px) scale(0.92); opacity: 0.56; }
      100% { transform: translate(110px, 40px) scale(0.55); opacity: 0; }
    }
    @keyframes dustOrbitF {
      0%   { transform: translate(18px, 58px) scale(0.55); opacity: 0; }
      10%  { opacity: 0.32; }
      48%  { transform: translate(-44px, 10px) scale(0.92); opacity: 0.52; }
      100% { transform: translate(-104px, 36px) scale(0.55); opacity: 0; }
    }
    @keyframes dustOrbitG {
      0%   { transform: translate(-98px, 8px) scale(0.6); opacity: 0; }
      14%  { opacity: 0.38; }
      50%  { transform: translate(2px, -14px) scale(0.95); opacity: 0.64; }
      100% { transform: translate(108px, 10px) scale(0.6); opacity: 0; }
    }
    @keyframes dustOrbitH {
      0%   { transform: translate(92px, 12px) scale(0.6); opacity: 0; }
      14%  { opacity: 0.36; }
      50%  { transform: translate(-10px, -12px) scale(0.95); opacity: 0.62; }
      100% { transform: translate(-110px, 14px) scale(0.6); opacity: 0; }
    }

    .leaf-swirl {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: center center;
      opacity: 0.98;
      z-index: 36;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.18));
    }

    .leaf-a { width: 28px; animation: leafOrbitA 4.7s linear infinite; }
    .leaf-b { width: 32px; animation: leafOrbitB 5.3s linear infinite; }
    .leaf-c { width: 24px; animation: leafOrbitC 4.0s linear infinite; }
    .leaf-d { width: 34px; animation: leafOrbitD 5.8s linear infinite; }
    .leaf-e { width: 22px; animation: leafOrbitE 3.9s linear infinite; }
    .leaf-f { width: 28px; animation: leafOrbitF 4.9s linear infinite; }

    @keyframes leafOrbitA {
      0%   { transform: translate(-145px, 18px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.85; }
      100% { transform: translate(165px, 14px) rotate(320deg); opacity: 0; }
    }
    @keyframes leafOrbitB {
      0%   { transform: translate(150px, 26px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.9; }
      100% { transform: translate(-150px, 32px) rotate(340deg); opacity: 0; }
    }
    @keyframes leafOrbitC {
      0%   { transform: translate(-92px, 62px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.82; }
      100% { transform: translate(108px, 38px) rotate(280deg); opacity: 0; }
    }
    @keyframes leafOrbitD {
      0%   { transform: translate(112px, 68px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.82; }
      100% { transform: translate(-118px, 44px) rotate(360deg); opacity: 0; }
    }
    @keyframes leafOrbitE {
      0%   { transform: translate(-44px, 74px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.76; }
      100% { transform: translate(86px, 48px) rotate(260deg); opacity: 0; }
    }
    @keyframes leafOrbitF {
      0%   { transform: translate(30px, 70px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.8; }
      100% { transform: translate(-96px, 42px) rotate(300deg); opacity: 0; }
    }

    .scene4-fire {
      position: absolute;
      inset: 0;
      z-index: 22;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    .scene4-fire.show {
      opacity: 1;
    }

    .fire-zone {
      position: absolute;
      left: 50%;
      top: 61%;
      width: 620px;
      height: 320px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .flame-core,
    .flame-mid,
    .flame-tip {
      position: absolute;
      bottom: 0;
      border-radius: 50% 50% 48% 48%;
      background: rgba(255,255,255,0.08);
      filter: blur(10px);
      opacity: 0.0;
      animation: flamePulse 1.8s ease-in-out infinite;
    }

    .flame-core {
      left: 42%;
      width: 110px;
      height: 110px;
      background: rgba(255,255,255,0.13);
      filter: blur(14px);
      animation-duration: 1.6s;
    }

    .flame-mid {
      left: 35%;
      width: 180px;
      height: 150px;
      background: rgba(220,220,220,0.11);
      filter: blur(18px);
      animation-duration: 2.1s;
    }

    .flame-tip {
      left: 46%;
      width: 70px;
      height: 180px;
      background: rgba(255,255,255,0.08);
      filter: blur(20px);
      animation-duration: 1.9s;
    }

    @keyframes flamePulse {
      0%   { transform: translateY(0) scale(0.94); opacity: 0.18; }
      50%  { transform: translateY(-8px) scale(1.06); opacity: 0.32; }
      100% { transform: translateY(0) scale(0.94); opacity: 0.18; }
    }

    .ember {
      position: absolute;
      bottom: 0;
      border-radius: 999px;
      opacity: 0;
      background: rgba(255,255,255,0.82);
      box-shadow:
        0 0 10px rgba(255,255,255,0.24),
        0 0 20px rgba(255,255,255,0.10);
      animation-timing-function: ease-out;
      animation-iteration-count: infinite;
    }

    .ash {
      position: absolute;
      bottom: 6%;
      border-radius: 999px;
      opacity: 0;
      background: rgba(210,210,210,0.72);
      box-shadow: 0 0 8px rgba(255,255,255,0.12);
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .smoke-dot {
      position: absolute;
      bottom: 8%;
      border-radius: 999px;
      opacity: 0;
      background: rgba(140,140,140,0.42);
      filter: blur(1px);
      animation-timing-function: ease-out;
      animation-iteration-count: infinite;
    }

    .glint {
      position: absolute;
      bottom: 12%;
      width: 2px;
      height: 2px;
      border-radius: 999px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 6px rgba(255,255,255,0.28);
      opacity: 0;
      animation-timing-function: ease-out;
      animation-iteration-count: infinite;
    }

    .ember.e2 { left: 18%; width: 5px; height: 5px; animation: emberRise2 2.1s infinite 0.35s; }

    .content {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      transition: opacity 0.6s ease;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .story-mode {
      justify-content: flex-start;
      padding-top: 7vh;
      padding-bottom: 4vh;
    }

    .loading {
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      color: #c8a64b;
      margin-bottom: 16px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
      opacity: 1;
      transition: opacity 0.8s ease;
    }

    .title {
      margin: 0;
      font-size: clamp(2.1rem, 4vw, 3.4rem);
      line-height: 1.12;
      max-width: 850px;
      color: #f5f2e8;
      text-shadow: 0 2px 16px rgba(0,0,0,0.58);
      opacity: 0;
      transform: translateY(10px);
      transition: 1s ease;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 1rem;
      line-height: 1.6;
      color: #ddd6c2;
      text-shadow: 0 2px 12px rgba(0,0,0,0.52);
      opacity: 0;
      transform: translateY(10px);
      transition: 1s ease 0.2s;
    }

    .button {
      margin-top: 32px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      transition: 1s ease 0.4s;
    }

    .button-inner {
      position: relative;
      display: inline-block;
      min-width: 150px;
      padding: 13px 28px;
      background: #f5f2e8;
      color: #111;
      border: 1.5px solid #111;
      border-radius: 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1rem;
      letter-spacing: 0.05em;
      box-shadow:
        0 8px 20px rgba(0,0,0,0.25),
        inset 0 0 0 1px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    .button-inner::before {
      content: "";
      position: absolute;
      inset: 6px;
      border: 1px dashed #111;
      border-radius: 9px;
      pointer-events: none;
    }

    .button-inner::after {
      content: "✦";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      color: #111;
      opacity: 0.85;
    }

    .button:hover .button-inner {
      background: #ebe6d6;
      transform: translateY(-2px);
      box-shadow:
        0 12px 28px rgba(0,0,0,0.35),
        inset 0 0 0 1px rgba(0,0,0,0.04);
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    .fade-out {
      opacity: 0;
    }

    .story-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      max-width: 1100px;
      width: 100%;
      min-height: 100%;
    }

    .story-text {
      font-size: 1.02rem;
      max-width: 760px;
      line-height: 1.68;
      color: #f5f2e8;
      text-shadow: 0 2px 14px rgba(0,0,0,0.62);
      opacity: 0;
      transform: translateY(12px);
      transition: 1s ease;
      margin-bottom: 18px;
      background: rgba(0, 0, 0, 0.30);
      border: 1px solid rgba(245, 242, 232, 0.08);
      border-radius: 16px;
      padding: 18px 20px;
      backdrop-filter: blur(1px);
      box-sizing: border-box;
      position: relative;
      z-index: 60;
    }

    .choices {
      width: min(980px, 92vw);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: auto;
      padding-top: 18px;
      position: relative;
      z-index: 60;
    }

    .choice-btn {
      position: relative;
      display: block;
      width: 100%;
      min-height: 118px;
      text-align: left;
      padding: 14px 16px;
      background: rgba(245, 242, 232, 0.94);
      color: #111;
      border: 1.5px solid #111;
      border-radius: 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.9rem;
      line-height: 1.38;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      box-sizing: border-box;
    }

    .choice-btn::before {
      content: "";
      position: absolute;
      inset: 6px;
      border: 1px dashed rgba(17,17,17,0.85);
      border-radius: 8px;
      pointer-events: none;
    }

    .choice-btn:hover {
      background: #ebe6d6;
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(0,0,0,0.24);
    }

    .choice-btn.selected {
      background: #ddd6c2;
      box-shadow: 0 12px 28px rgba(0,0,0,0.30);
      transform: translateY(-1px);
    }

    @media (max-width: 900px) {
      .choices {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .choice-btn {
        min-height: 108px;
      }

      .flow-zone {
        width: 280px;
        height: 120px;
        top: 60%;
      }

      .fire-zone {
        width: 420px;
        height: 240px;
        top: 66%;
      }

      .dragon-img {
        width: 78vw;
        top: 19%;
      }

      .wings-img {
        width: 90vw;
        top: 14%;
      }
    }

    @media (max-width: 640px) {
      .story-mode {
        padding-top: 4vh;
        padding-bottom: 4vh;
      }

      .branch-img {
        width: 145%;
      }

      .apollo-img,
      .damsel-img {
        width: 78vw;
        top: 16%;
      }

      .dragon-img {
        width: 92vw;
        top: 24%;
      }

      .wings-img {
        width: 100vw;
        top: 18%;
      }

      .story-text {
        font-size: 1rem;
        padding: 18px;
      }

      .choices {
        grid-template-columns: 1fr;
        width: min(680px, 92vw);
      }

      .choice-btn {
        min-height: auto;
        font-size: 0.92rem;
      }

      .flow-zone {
        width: 220px;
        height: 110px;
        top: 62%;
      }

      .aura-zone {
        width: 200px;
        height: 260px;
        top: 38%;
      }

      .fire-zone {
        width: 310px;
        height: 190px;
        top: 72%;
      }
    }

    <div class="content" id="content">
      <div class="loading" id="loading">
        Loading your path...
      </div>

      <h1 class="title" id="title">
        What Is Your PLC Origin Story?
      </h1>

      <div class="subtitle" id="subtitle">
        The path begins behind Lake Claire.
      </div>

      <button class="button" id="begin" type="button">
        <span class="button-inner">Begin</span>
      </button>

  <script>
    const PATHS = {
      loadingBg: "loading-bg.png",
      scene1Bg: "scene1-bg.png",
      scene2Bg: "scene2-bg.jpeg",
      scene3Bg: "scene3-bg.jpeg",
      scene4Bg: "scene2-bg.jpeg"
    };

    const loading = document.getElementById("loading");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const button = document.getElementById("begin");
    const content = document.getElementById("content");
    const bg = document.getElementById("bg");
    const branches = document.getElementById("branches");
    const mist = document.getElementById("mist");
    const particles = document.getElementById("particles");
    const apolloOverlay = document.getElementById("apolloOverlay");
    const damselOverlay = document.getElementById("damselOverlay");
    const dragonOverlay = document.getElementById("dragonOverlay");
    const wingsOverlay = document.getElementById("wingsOverlay");
    const scene2Flow = document.getElementById("scene2Flow");
    const scene3Aura = document.getElementById("scene3Aura");
    const scene4Fire = document.getElementById("scene4Fire");

    const scores = JSON.parse(localStorage.getItem("plcOriginScores")) || {
      hero: 0,
      antihero: 0,
      sorcerer: 0,
      alchemist: 0,
      trickster: 0,
      sage: 0
    };

    function saveScores() {
      localStorage.setItem("plcOriginScores", JSON.stringify(scores));
    }

    function setBackground(path, overlayStrength = "0.42") {
      bg.style.backgroundImage = `
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.10),
          rgba(0, 0, 0, 0.22) 45%,
          rgba(0, 0, 0, ${overlayStrength})
        ),
        url("${path}")
      `;
    }

    function applyChoice(archetype, buttonEl, onComplete) {
      scores[archetype] += 1;
      saveScores();

      document.querySelectorAll(".choice-btn").forEach((btn) => {
        btn.disabled = true;
        btn.classList.remove("selected");
      });

      buttonEl.classList.add("selected");
      console.log("Current PLC Origin scores:", scores);

      if (onComplete) {
        setTimeout(onComplete, 700);
      }
    }

    function softenParticles() {
      [...particles.children].forEach((p) => p.classList.add("scene-particle"));
    }

    function clearOverlays() {
      apolloOverlay.classList.remove("show");
      damselOverlay.classList.remove("show");
      dragonOverlay.classList.remove("show");
      wingsOverlay.classList.remove("show");
      scene2Flow.classList.remove("show");
      scene3Aura.classList.remove("show");
      scene4Fire.classList.remove("show");
    }

    function renderScene1() {
      setBackground(PATHS.scene1Bg, "0.42");
      branches.classList.add("show");
      mist.classList.add("show");
      clearOverlays();
      softenParticles();

      content.innerHTML = `
        <div class="story-wrap">
          <div class="story-text" id="story">
            You step onto a path behind Lake Claire. The trees close in faster than you expect, and the sounds of campus fall away until it is just you and the quiet. There is no guide, no instructions, no sign telling you what comes next. Just the path, and the choice to begin.
          </div>

          <div class="choices">
            <button class="choice-btn" data-archetype="hero">A. Move forward anyway. If something needs to be faced, you will face it.</button>
            <button class="choice-btn" data-archetype="antihero">B. Pause. You are not stepping into something without understanding it first.</button>
            <button class="choice-btn" data-archetype="sorcerer">C. Stay still and take it in. The silence is not empty. There is something to notice.</button>
            <button class="choice-btn" data-archetype="alchemist">D. Look closer at your surroundings. If you are going to move forward, you want something to work with.</button>
            <button class="choice-btn" data-archetype="trickster">E. Step slightly off the path. You want to see how far it actually holds.</button>
            <button class="choice-btn" data-archetype="sage">F. Take a breath and consider where this path could lead before committing to it.</button>
          </div>
        </div>
      `;

      const story = document.getElementById("story");
      setTimeout(() => {
        content.classList.remove("fade-out");
        content.classList.add("story-mode");
        story.style.opacity = "1";
        story.style.transform = "translateY(0)";
      }, 120);

      document.querySelectorAll(".choice-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          applyChoice(btn.dataset.archetype, btn, () => {
            content.classList.add("fade-out");
            setTimeout(renderScene2, 550);
          });
        });
      });
    }

    function renderScene2() {
      setBackground(PATHS.scene2Bg, "0.48");
      branches.classList.add("show");
      mist.classList.add("show");
      clearOverlays();
      apolloOverlay.classList.add("show");
      scene2Flow.classList.add("show");
      softenParticles();

      content.innerHTML = `
        <div class="story-wrap">
          <div class="story-text" id="story">
            Further in, the trees begin to thin, and stone rises through the roots. What should be familiar doesn’t feel that way anymore. A structure stands ahead, columns worn and sunlit, arranged like something older than the campus around it. A shrine. To Apollo. You do not remember this being here. Then something shifts. Not loud. Not sudden. But enough to tell you the path has changed.
          </div>

          <div class="choices">
            <button class="choice-btn" data-archetype="hero">A. Move toward it. If something is wrong, you are not going to leave it alone.</button>
            <button class="choice-btn" data-archetype="antihero">B. Stay just out of reach and watch closely. You want to understand it before you decide how to act.</button>
            <button class="choice-btn" data-archetype="sorcerer">C. Follow its movement. The way it shifts tells you more than anything you could ask.</button>
            <button class="choice-btn" data-archetype="alchemist">D. Reach for something useful nearby. If it becomes a problem, you will be ready for it.</button>
            <button class="choice-btn" data-archetype="trickster">E. Make your presence known. If something is out there, you would rather it react to you.</button>
            <button class="choice-btn" data-archetype="sage">F. Hold your position and wait. Acting too soon would tell you less than staying still.</button>
          </div>
        </div>
      `;

      const story = document.getElementById("story");
      setTimeout(() => {
        content.classList.remove("fade-out");
        content.classList.add("story-mode");
        story.style.opacity = "1";
        story.style.transform = "translateY(0)";
      }, 120);

      document.querySelectorAll(".choice-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          applyChoice(btn.dataset.archetype, btn, () => {
            content.classList.add("fade-out");
            setTimeout(renderScene3, 550);
          });
        });
      });
    }

    function renderScene3() {
      setBackground(PATHS.scene3Bg, "0.46");
      branches.classList.add("show");
      mist.classList.add("show");
      clearOverlays();
      damselOverlay.classList.add("show");
      scene3Aura.classList.add("show");
      softenParticles();

      content.innerHTML = `
        <div class="story-wrap">
          <div class="story-text" id="story">
            You come across someone else on the path. They look unsure, like they have been waiting for someone to show up. When they see you, they hesitate, like they are trying to decide if they should say something at all.
          </div>

          <div class="choices">
            <button class="choice-btn" data-archetype="hero">A. Tell them to stay close. You will figure it out together.</button>
            <button class="choice-btn" data-archetype="antihero">B. Ask them what happened before deciding what to do next.</button>
            <button class="choice-btn" data-archetype="sorcerer">C. Watch how they respond before deciding how much to trust what they say.</button>
            <button class="choice-btn" data-archetype="alchemist">D. Give them something small to do. Standing still will not help either of you move forward.</button>
            <button class="choice-btn" data-archetype="trickster">E. Say something to ease the tension. They will think clearer if they are not stuck in it.</button>
            <button class="choice-btn" data-archetype="sage">F. Listen first. Then tell them what they need to hear, not just what they want.</button>
          </div>
        </div>
      `;

      const story = document.getElementById("story");
      setTimeout(() => {
        content.classList.remove("fade-out");
        content.classList.add("story-mode");
        story.style.opacity = "1";
        story.style.transform = "translateY(0)";
      }, 120);

      document.querySelectorAll(".choice-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          applyChoice(btn.dataset.archetype, btn, () => {
            content.classList.add("fade-out");
            setTimeout(renderScene4, 550);
          });
        });
      });
    }

    function renderScene4() {
      setBackground(PATHS.scene4Bg, "0.50");
      branches.classList.add("show");
      mist.classList.add("show");
      clearOverlays();
      dragonOverlay.classList.add("show");
      wingsOverlay.classList.add("show");
      scene4Fire.classList.add("show");
      softenParticles();

      content.innerHTML = `
        <div class="story-wrap">
          <div class="story-text" id="story">
            The trees break into a clearing, and the path stops. A dragon stands ahead, its scales catching the light like hammered metal. The moment you enter, it lifts its head. The ground trembles beneath your feet. A low growl builds in its chest before tearing loose into a roar that rips through the clearing, hot breath rushing toward you as it drops down and blocks the path completely.
          </div>

          <div class="choices">
            <button class="choice-btn" data-archetype="hero">A. Step forward. If it comes to a fight, you will meet it directly.</button>
            <button class="choice-btn" data-archetype="antihero">B. Do not rush in. You want to understand why it is here before you decide anything.</button>
            <button class="choice-btn" data-archetype="sorcerer">C. Study it. Its movement, its breathing, the way it watches you. There is a pattern.</button>
            <button class="choice-btn" data-archetype="alchemist">D. Look around the clearing. The answer is not just the dragon, it is everything around it.</button>
            <button class="choice-btn" data-archetype="trickster">E. Shift its attention. If you control what it focuses on, you control what happens next.</button>
            <button class="choice-btn" data-archetype="sage">F. Hold your ground. Acting at the wrong moment would cost more than waiting.</button>
          </div>
        </div>
      `;

      const story = document.getElementById("story");
      setTimeout(() => {
        content.classList.remove("fade-out");
        content.classList.add("story-mode");
        story.style.opacity = "1";
        story.style.transform = "translateY(0)";
      }, 120);

      document.querySelectorAll(".choice-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          applyChoice(btn.dataset.archetype, btn, () => {
            console.log("Scene 4 complete. Current PLC Origin scores:", scores);
          });
        });
      });
    }

    setBackground(PATHS.loadingBg, "0.58");

    setTimeout(() => {
      loading.style.opacity = "0";
    }, 1200);

    setTimeout(() => {
      title.classList.add("show");
      subtitle.classList.add("show");
      button.classList.add("show");
    }, 1600);

    button.addEventListener("click", () => {
      content.classList.add("fade-out");
      setTimeout(renderScene1, 650);
    });
  </script>
